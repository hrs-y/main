  <link rel="icon" type="image/svg+xml" sizes="any" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='14'%20fill='%23F8F4EC'/%3E%3Cpath%20d='M20%2014C19%2024%2019%2039%2020%2050M44%2014C43%2024%2043%2039%2044%2050M20%2031C26%2029%2032%2029%2044%2031'%20fill='none'%20stroke='%231B3A5C'%20stroke-width='4.2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E" />

  <script>
    (function () {
      var theme = "light";
      try {
        var stored = localStorage.getItem("hysn-theme");
        if (stored === "dark" || stored === "light") theme = stored;
        else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) theme = "dark";
      } catch (e) {
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) theme = "dark";
      }
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=Noto+Serif+TC:wght@400;500&display=swap" />

  <style>
    :root {
      color-scheme: light;
      --bg: #F8F4EC;
      --text: #1F1B16;
      --muted: #766B5A;
      --muted-light: #A39A89;
      --line: rgba(31, 27, 22, 0.12);
      --line-strong: rgba(31, 27, 22, 0.24);
      --accent: #1B3A5C;
      --accent-soft: rgba(27, 58, 92, 0.09);
      --accent-2: #8B6F3F;
      --serif: "Cormorant Garamond", "Noto Serif TC", Georgia, serif;
      --transition: 300ms cubic-bezier(.2,.8,.2,1);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #141110;
      --text: #EFE8DC;
      --muted: #938875;
      --muted-light: #615647;
      --line: rgba(239, 232, 220, 0.10);
      --line-strong: rgba(239, 232, 220, 0.22);
      --accent: #8AB0D4;
      --accent-soft: rgba(138, 176, 212, 0.14);
      --accent-2: #D4A866;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      background: var(--bg);
      font-family: var(--serif);
      transition: background-color var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; text-decoration: none; }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
      cursor: pointer;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── Header ── */
    header {
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
    }
    .brand svg { width: 26px; height: 26px; }

    .header-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      transition: border-color 220ms ease;
    }
    .lang-switch:hover { border-color: var(--line-strong); }
    .lang-btn {
      min-width: 32px;
      height: 26px;
      padding: 0 8px;
      border-radius: 999px;
      color: var(--muted);
      font-family: var(--serif);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      transition: background 220ms ease, color 220ms ease;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.is-active { background: var(--accent-soft); color: var(--text); }

    .theme-toggle {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color var(--transition), transform var(--transition);
    }
    .theme-toggle:hover { color: var(--text); transform: rotate(15deg); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 80px;
    }

    .page {
      text-align: center;
      max-width: 560px;
    }

    .page__number {
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.82rem;
      letter-spacing: 0.32em;
      color: var(--muted-light);
      margin-bottom: clamp(32px, 8vh, 72px);
    }

    .page__title {
      margin: 0;
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      line-height: 1.15;
      color: var(--text);
      letter-spacing: 0.005em;
    }

    .page__ornament {
      margin: clamp(18px, 3vh, 28px) 0;
      color: var(--accent-2);
      font-size: 1.1rem;
      opacity: 0.6;
    }

    .page__note {
      margin: 0 0 clamp(36px, 8vh, 64px);
      font-family: "Noto Serif TC", var(--serif);
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .page__link {
      display: inline-block;
      padding: 4px 0;
      font-size: 0.95rem;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      transition: color var(--transition), border-color var(--transition);
    }
    .page__link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .page__link .arrow {
      display: inline-block;
      margin-right: 6px;
      transition: transform var(--transition);
    }
    .page__link:hover .arrow { transform: translateX(-3px); }

    /* ── Footer ── */
    footer {
      padding: 20px 28px 32px;
      text-align: center;
      color: var(--muted-light);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/" aria-label="HYSN.NET home">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
        <rect width="64" height="64" rx="14" fill="var(--bg, #F8F4EC)"/>
        <path d="M20 14 C19 24,19 39,20 50 M44 14 C43 24,43 39,44 50 M20 31 C26 29,32 29,44 31" fill="none" stroke="var(--accent, #1B3A5C)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>HYSN.NET</span>
    </a>
    <div class="header-controls">
      <div class="lang-switch" role="group" aria-label="Language switcher">
        <button class="lang-btn" type="button" data-lang="zh-Hant">繁</button>
        <button class="lang-btn" type="button" data-lang="zh-Hans">簡</button>
        <button class="lang-btn" type="button" data-lang="en">EN</button>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="切換深淺色">
        <span id="themeIcon" aria-hidden="true">☼</span>
      </button>
    </div>
  </header>

  <main>
    <div class="page">
      <div class="page__number">№ CDIV</div>
      <h1 class="page__title">Hic sunt dracones</h1>
      <div class="page__ornament" aria-hidden="true">❦</div>
      <p class="page__note" data-i18n="note">此頁闕如。</p>
      <a class="page__link" href="/">
        <span class="arrow" aria-hidden="true">←</span><span data-i18n="back">返回首頁</span>
      </a>
    </div>
  </main>

  <footer>&copy;2026 HYSN.NET</footer>

  <script>
    (function() {
      var translations = {
        "zh-Hant": {
          note: "此頁闕如。",
          back: "返回首頁",
          ui: { toggleToDark: "切換為深色模式", toggleToLight: "切換為淺色模式" }
        },
        "zh-Hans": {
          note: "此页阙如。",
          back: "返回首页",
          ui: { toggleToDark: "切换为深色模式", toggleToLight: "切换为浅色模式" }
        },
        en: {
          note: "This page is missing.",
          back: "Back to Home",
          ui: { toggleToDark: "Switch to dark mode", toggleToLight: "Switch to light mode" }
        }
      };

      var root = document.documentElement;
      var toggle = document.getElementById("themeToggle");
      var icon = document.getElementById("themeIcon");
      var meta = document.querySelector('meta[name="theme-color"]');
      var langButtons = Array.from(document.querySelectorAll(".lang-btn"));

      var storage = {
        get: function(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
        set: function(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }
      };

      function resolveKey(obj, path) {
        return path.split(".").reduce(function(a, k) { return a && a[k] !== undefined ? a[k] : null; }, obj);
      }

      function detectLanguage() {
        var stored = storage.get("hysn-lang");
        if (stored && translations[stored]) return stored;
        var bl = (navigator.language || navigator.userLanguage || "en").toLowerCase();
        if (bl.indexOf("zh") === 0) {
          if (bl.indexOf("hans") !== -1 || bl.indexOf("cn") !== -1 || bl.indexOf("sg") !== -1 || bl.indexOf("my") !== -1) return "zh-Hans";
          return "zh-Hant";
        }
        return "en";
      }

      function applyLanguage(lang, persist) {
        var sel = translations[lang] ? lang : "en";
        root.lang = sel;
        document.querySelectorAll("[data-i18n]").forEach(function(el) {
          var v = resolveKey(translations[sel], el.getAttribute("data-i18n"));
          if (v !== null) el.textContent = v;
        });
        langButtons.forEach(function(b) {
          var on = b.dataset.lang === sel;
          b.classList.toggle("is-active", on);
          b.setAttribute("aria-pressed", String(on));
        });
        var ct = root.getAttribute("data-theme") || "light";
        toggle.setAttribute("aria-label", ct === "dark" ? translations[sel].ui.toggleToLight : translations[sel].ui.toggleToDark);
        if (persist) storage.set("hysn-lang", sel);
      }

      function applyTheme(theme, persist) {
        var next = theme === "dark" ? "dark" : "light";
        root.setAttribute("data-theme", next);
        icon.textContent = next === "dark" ? "\u263e" : "\u263c";
        var sel = root.lang && translations[root.lang] ? root.lang : detectLanguage();
        toggle.setAttribute("aria-label", next === "dark" ? translations[sel].ui.toggleToLight : translations[sel].ui.toggleToDark);
        if (meta) meta.setAttribute("content", next === "dark" ? "#141110" : "#F8F4EC");
        if (persist) storage.set("hysn-theme", next);
      }

      applyLanguage(detectLanguage(), false);
      applyTheme(root.getAttribute("data-theme") || "light", false);

      toggle.addEventListener("click", function() {
        var c = root.getAttribute("data-theme") || "light";
        applyTheme(c === "dark" ? "light" : "dark", true);
      });

      document.addEventListener("click", function(e) {
        var lb = e.target.closest(".lang-btn");
        if (lb) applyLanguage(lb.dataset.lang, true);
      });

      var prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
      function handleSys(e) {
        if (!storage.get("hysn-theme")) applyTheme(e.matches ? "dark" : "light", false);
      }
      if (typeof prefersDark.addEventListener === "function") prefersDark.addEventListener("change", handleSys);
      else if (typeof prefersDark.addListener === "function") prefersDark.addListener(handleSys);
    })();
  </script>
