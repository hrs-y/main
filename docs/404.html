<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · HYSN.NET</title>
  <meta name="description" content="Hic sunt dracones — 此頁闕如。" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#F8F4EC" />
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" type="image/svg+xml" sizes="any" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='14'%20fill='%23F8F4EC'/%3E%3Cpath%20d='M20%2014C19%2024%2019%2039%2020%2050M44%2014C43%2024%2043%2039%2044%2050M20%2031C26%2029%2032%2029%2044%2031'%20fill='none'%20stroke='%231B3A5C'%20stroke-width='4.2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E" />

  <script>
    (function () {
      var theme = "light";
      try {
        var stored = localStorage.getItem("hysn-theme");
        if (stored === "dark" || stored === "light") theme = stored;
        else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) theme = "dark";
      } catch (e) {
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) theme = "dark";
      }
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=Noto+Serif+TC:wght@400;500&display=swap" />

  <style>
    :root {
      color-scheme: light;
      --bg: #F8F4EC;
      --text: #1F1B16;
      --muted: #766B5A;
      --muted-light: #A39A89;
      --line: rgba(31, 27, 22, 0.12);
      --accent: #1B3A5C;
      --accent-2: #8B6F3F;
      --serif: "Cormorant Garamond", "Noto Serif TC", Georgia, serif;
      --transition: 300ms cubic-bezier(.2,.8,.2,1);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #141110;
      --text: #EFE8DC;
      --muted: #938875;
      --muted-light: #615647;
      --line: rgba(239, 232, 220, 0.10);
      --accent: #8AB0D4;
      --accent-2: #D4A866;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      background: var(--bg);
      font-family: var(--serif);
      transition: background-color var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; text-decoration: none; }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
      cursor: pointer;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── Header ── */
    header {
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
    }
    .brand svg { width: 26px; height: 26px; }

    .theme-toggle {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color var(--transition), transform var(--transition);
    }
    .theme-toggle:hover { color: var(--text); transform: rotate(15deg); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 80px;
    }

    .page {
      text-align: center;
      max-width: 560px;
    }

    .page__number {
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.82rem;
      letter-spacing: 0.32em;
      color: var(--muted-light);
      margin-bottom: clamp(32px, 8vh, 72px);
    }

    .page__title {
      margin: 0;
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      line-height: 1.15;
      color: var(--text);
      letter-spacing: 0.005em;
    }

    .page__ornament {
      margin: clamp(18px, 3vh, 28px) 0;
      color: var(--accent-2);
      font-size: 1.1rem;
      opacity: 0.6;
    }

    .page__note {
      margin: 0 0 clamp(36px, 8vh, 64px);
      font-family: "Noto Serif TC", var(--serif);
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .page__link {
      display: inline-block;
      padding: 4px 0;
      font-size: 0.95rem;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      transition: color var(--transition), border-color var(--transition);
    }
    .page__link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .page__link .arrow {
      display: inline-block;
      margin-right: 6px;
      transition: transform var(--transition);
    }
    .page__link:hover .arrow { transform: translateX(-3px); }

    /* ── Footer ── */
    footer {
      padding: 20px 28px 32px;
      text-align: center;
      color: var(--muted-light);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/" aria-label="HYSN.NET home">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
        <rect width="64" height="64" rx="14" fill="var(--bg, #F8F4EC)"/>
        <path d="M20 14 C19 24,19 39,20 50 M44 14 C43 24,43 39,44 50 M20 31 C26 29,32 29,44 31" fill="none" stroke="var(--accent, #1B3A5C)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>HYSN.NET</span>
    </a>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="切換深淺色">
      <span id="themeIcon" aria-hidden="true">☼</span>
    </button>
  </header>

  <main>
    <div class="page">
      <div class="page__number">№ CDIV</div>
      <h1 class="page__title">Hic sunt dracones</h1>
      <div class="page__ornament" aria-hidden="true">❦</div>
      <p class="page__note">此頁闕如。</p>
      <a class="page__link" href="/">
        <span class="arrow" aria-hidden="true">←</span>返回首頁
      </a>
    </div>
  </main>

  <footer>&copy;2026 HYSN.NET</footer>

  <script>
    (function() {
      var root = document.documentElement;
      var toggle = document.getElementById("themeToggle");
      var icon = document.getElementById("themeIcon");
      var meta = document.querySelector('meta[name="theme-color"]');

      function apply(theme, persist) {
        var next = theme === "dark" ? "dark" : "light";
        root.setAttribute("data-theme", next);
        icon.textContent = next === "dark" ? "\u263e" : "\u263c";
        toggle.setAttribute("aria-label", next === "dark" ? "切換為淺色模式" : "切換為深色模式");
        if (meta) meta.setAttribute("content", next === "dark" ? "#141110" : "#F8F4EC");
        if (persist) { try { localStorage.setItem("hysn-theme", next); } catch (e) {} }
      }

      apply(root.getAttribute("data-theme") || "light", false);

      toggle.addEventListener("click", function() {
        var c = root.getAttribute("data-theme") || "light";
        apply(c === "dark" ? "light" : "dark", true);
      });

      var prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
      function handle(e) {
        var stored = null;
        try { stored = localStorage.getItem("hysn-theme"); } catch (err) {}
        if (!stored) apply(e.matches ? "dark" : "light", false);
      }
      if (typeof prefersDark.addEventListener === "function") prefersDark.addEventListener("change", handle);
      else if (typeof prefersDark.addListener === "function") prefersDark.addListener(handle);
    })();
  </script>
</body>
</html>
